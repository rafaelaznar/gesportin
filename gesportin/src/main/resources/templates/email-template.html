<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${title}">Gesportin</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
          <tr>
            <td style="background:#0d6efd;color:#ffffff;padding:20px 24px;">
              <h1 style="margin:0;font-size:22px;line-height:1.3;" th:text="${title}">Gesportin</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 16px;font-size:16px;line-height:1.5;" th:text="${mainMessage}">
                Mensaje principal.
              </p>
              <p style="margin:0 0 22px;font-size:14px;line-height:1.5;color:#4b5563;" th:text="${secondaryMessage}">
                Mensaje secundario.
              </p>
              <p th:if="${actionUrl != null}" style="margin:0 0 22px;">
                <a th:href="${actionUrl}" th:text="${actionText}" style="display:inline-block;background:#0d6efd;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:6px;font-weight:700;">
                  Accion
                </a>
              </p>
              <p th:if="${actionUrl != null}" style="margin:0;font-size:12px;line-height:1.5;color:#6b7280;">
                Si el boton no funciona, copia y pega este enlace en el navegador:
                <br>
                <span th:text="${actionUrl}">https://localhost</span>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
