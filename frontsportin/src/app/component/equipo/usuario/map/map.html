<div class="equipo-usuario-map-root">
  @if (loading()) {
    <div class="text-center py-4">
      <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Cargando...</span></div>
    </div>
  } @else if (error()) {
    <div class="alert alert-danger small mb-0">{{ error() }}</div>
  } @else if (partido()) {
    @if (partido()?.latitud != null && partido()?.longitud != null) {
      <div id="{{ mapId }}" class="equipo-usuario-map-container"></div>
    } @else {
      <div class="alert alert-warning small mb-0">Sin coordenadas disponibles para este partido.</div>
    }
  }
</div>
