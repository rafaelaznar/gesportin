<div class="container-fluid">
  <app-breadcrumb [items]="breadcrumbItems()"></app-breadcrumb>
  <div class="d-flex justify-content-center my-3">
    <h1 class="mb-0">
      <i class="bi bi-calendar-event me-2" aria-hidden="true"></i>Eliminar temporada
    </h1>
  </div>

  @if (error()) {
    <div class="alert alert-danger m-3">{{ error() }}</div>
  }

  @if (!error()) {
    <div class="container p-4">
      <app-temporada-teamadmin-detail [id]="id_temporada"></app-temporada-teamadmin-detail>

      <app-confirmacion-borrado
        [title]="'¿Seguro que desea eliminar esta temporada?'"
        [message]="'Esta acción no se puede deshacer. Por precaución, el sistema mantendrá toda la información asociada a la temporada durante un tiempo hasta que se ejecute el mantenimiento del sistema'"
        (confirm)="doDelete()"
        (cancel)="doCancel()"
      ></app-confirmacion-borrado>
    </div>
  }
</div>
