<div class="page-container">
  <div class="success-card">
    <div class="success-icon">
      <i class="bi bi-check-circle-fill"></i>
    </div>
    <h2 class="success-title">¡Pago realizado!</h2>
    <p class="success-msg">
      @if (tipo() === 'TIENDA') {
        Tu compra se ha procesado correctamente. Puedes ver tu factura en tu historial de facturas.
      } @else {
        El pago de tu cuota ha sido registrado correctamente.
      }
    </p>
    <div class="success-actions">
      @if (tipo() === 'TIENDA') {
        <a routerLink="/mi/facturas" class="btn btn-primary">
          <i class="bi bi-receipt me-1"></i>Ver mis facturas
        </a>
      } @else {
        <a routerLink="/mi/cuotas" class="btn btn-primary">
          <i class="bi bi-cash-coin me-1"></i>Ver mis cuotas
        </a>
      }
      <a routerLink="/" class="btn btn-outline-secondary">
        <i class="bi bi-house me-1"></i>Inicio
      </a>
    </div>
  </div>
</div>
