<div class="container-fluid">
  <app-breadcrumb [items]="breadcrumbItems()"></app-breadcrumb>
  <div class="d-flex justify-content-center my-3">
    <h1 class="mb-0"><i class="bi bi-calendar-event me-2" aria-hidden="true"></i>Eliminar tipo de artículo</h1>
  </div>


  @if (error()) {
  <div class="alert alert-danger m-3">{{ error() }}</div>
  }

  @if (!error()) {
  <div class="container p-4">

    <app-tipoarticulo-teamadmin-detail [id]="id_tipoarticulo"></app-tipoarticulo-teamadmin-detail>

    <app-confirmacion-borrado title="¿Seguro que desea eliminar este tipo de artículo?"
      message="Esta acción no se puede deshacer." confirmLabel="Eliminar" cancelLabel="Cancelar" (confirm)="doDelete()"
      (cancel)="doCancel()"></app-confirmacion-borrado>
  </div>
  }

</div>
